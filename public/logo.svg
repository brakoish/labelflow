<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Cowboy riding a bucking label - Label Wrangler logo -->
  <g transform="translate(20, 10)">
    <!-- The "label" as the bronco body - a tilted rectangle/tag shape -->
    <g transform="rotate(-15, 80, 120)">
      <!-- Label body -->
      <rect x="30" y="95" width="100" height="60" rx="4" fill="currentColor"/>
      <!-- Tag hole -->
      <circle cx="45" cy="110" r="6" fill="none" stroke="currentColor" stroke-width="3"/>
      <!-- Tag string -->
      <path d="M 39 105 Q 25 90 20 85" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Front "legs" of the bucking label -->
      <line x1="45" y1="155" x2="35" y2="180" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
      <line x1="65" y1="155" x2="55" y2="182" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
      <!-- Back "legs" kicked up -->
      <line x1="110" y1="150" x2="135" y2="130" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
      <line x1="120" y1="155" x2="148" y2="138" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
    </g>
    
    <!-- Cowboy rider -->
    <g>
      <!-- Body/torso -->
      <rect x="68" y="52" width="16" height="28" rx="3" fill="currentColor"/>
      <!-- Head -->
      <circle cx="76" cy="42" r="9" fill="currentColor"/>
      <!-- Cowboy hat brim -->
      <ellipse cx="76" cy="34" rx="16" ry="4" fill="currentColor"/>
      <!-- Cowboy hat crown -->
      <rect x="68" y="24" width="16" height="11" rx="2" fill="currentColor"/>
      <!-- Hat dent -->
      <path d="M 70 25 Q 76 29 82 25" stroke="currentColor" stroke-width="0" fill="currentColor"/>
      
      <!-- Raised arm (right) - classic rodeo pose -->
      <path d="M 82 58 Q 100 45 105 28" stroke="currentColor" stroke-width="7" fill="none" stroke-linecap="round"/>
      
      <!-- Rein arm (left) -->
      <path d="M 70 60 Q 58 68 52 78" stroke="currentColor" stroke-width="6" fill="none" stroke-linecap="round"/>
      
      <!-- Legs gripping -->
      <path d="M 72 80 L 60 95 L 55 100" stroke="currentColor" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M 80 80 L 90 95 L 95 100" stroke="currentColor" stroke-width="7" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
